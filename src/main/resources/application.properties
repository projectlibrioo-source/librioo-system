spring.datasource.url=jdbc:mysql://localhost:3306/LIBRARYDATABASE?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# HikariCP Configuration (Fix connection timeout issues)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Max size for a single uploaded file
spring.servlet.multipart.max-file-size=2MB

# Max size for the whole request (all parts together)
spring.servlet.multipart.max-request-size=2MB


spring.security.user.name=admin
